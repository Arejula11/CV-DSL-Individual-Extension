<!DOCTYPE html>
<html lang="es">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta http-equiv="Content-Language" content="es">
	<title>Editor Web DSL - CV</title>
	
	<link rel="stylesheet" type="text/css" href="xtext/2.41.0/xtext-ace.css"/>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
	
	<style>
		/* Variables para el Tema Claro y Naranja */
		:root {
			--bg-light: #ffffff;
			--bg-soft: #f8f9fa;
			--bg-header: #ffffff;
			--text-main: #2d3436;
			--text-muted: #636e72;
			--accent-color: #f39c12; /* Naranja principal */
			--accent-hover: #e67e22; /* Naranja más oscuro */
			--border-color: #dfe6e9;
			--shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
		}

		body, html {
			margin: 0;
			padding: 0;
			height: 100%;
			font-family: 'Inter', sans-serif;
			background-color: var(--bg-light);
			color: var(--text-main);
			overflow: hidden;
		}

		.header {
			background-color: var(--bg-header);
			padding: 0 32px;
			height: 70px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			border-bottom: 2px solid var(--border-color);
			z-index: 10;
			position: relative;
		}

		.header-title {
			display: flex;
			align-items: center;
			gap: 14px;
		}

		.header h1 {
			margin: 0;
			font-size: 1.25rem;
			font-weight: 600;
			color: var(--text-main);
			letter-spacing: -0.5px;
		}

		.header button {
			background-color: var(--accent-color);
			color: white;
			border: none;
			padding: 10px 24px;
			font-size: 0.95rem;
			font-weight: 600;
			cursor: pointer;
			border-radius: 8px;
			transition: all 0.2s ease;
			display: flex;
			align-items: center;
			gap: 10px;
			box-shadow: 0 4px 14px 0 rgba(243, 156, 18, 0.3);
		}

		.header button:hover:not(:disabled) {
			background-color: var(--accent-hover);
			transform: translateY(-1px);
			box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4);
		}

		.header button:disabled {
			background-color: #bdc3c7;
			box-shadow: none;
			cursor: not-allowed;
		}

		.split-container {
			display: flex;
			height: calc(100vh - 70px);
			width: 100%;
		}

		.editor-panel {
			flex: 1;
			position: relative;
			border-right: 2px solid var(--border-color);
			background-color: var(--bg-light);
		}

		#xtext-editor {
			position: absolute;
			top: 0;
			bottom: 0;
			left: 0;
			right: 0;
			font-size: 14px !important;
		}

		.pdf-panel {
			flex: 1;
			background-color: var(--bg-soft);
			position: relative;
		}

		.pdf-panel iframe {
			width: 100%;
			height: 100%;
			border: none;
		}

		.pdf-placeholder {
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			bottom: 0;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			color: var(--text-muted);
			pointer-events: none;
			background-color: var(--bg-soft);
		}
		
		.pdf-placeholder p {
			margin-top: 15px;
			font-weight: 500;
		}
	</style>

	<script src="webjars/requirejs/2.3.7/require.min.js"></script>
	<script type="text/javascript">
		var baseUrl = window.location.pathname;
		var fileIndex = baseUrl.indexOf("index.html");
		if (fileIndex > 0) baseUrl = baseUrl.slice(0, fileIndex);
			
		require.config({
			baseUrl: baseUrl,
			paths: {
				"jquery": "webjars/jquery/3.6.0/jquery.min",
				"ace/ext/language_tools": "webjars/ace/1.3.3/src/ext-language_tools",
				"xtext/xtext-ace": "xtext/2.41.0/xtext-ace"
			}
		});

		var dslEditorInstance;

		require(["webjars/ace/1.3.3/src/ace"], function() {
			require(["xtext/xtext-ace"], function(xtext) {
				dslEditorInstance = xtext.createEditor({
					baseUrl: baseUrl,
					syntaxDefinition: "xtext-resources/generated/mode-resume"
				});

				setTimeout(() => {
					if (typeof ace !== 'undefined') {
						const editor = ace.edit("xtext-editor");
						// Cambiado a tema claro 'chrome' para combinar con el diseño
						editor.setTheme("ace/theme/chrome");
						editor.setShowPrintMargin(false);
					}
				}, 500);
			});
		});
	</script>
</head>
<body>

	<div class="header">
		<div class="header-title">
			<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
				<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
				<polyline points="14 2 14 8 20 8"></polyline>
				<line x1="16" y1="13" x2="8" y2="13"></line>
				<line x1="16" y1="17" x2="8" y2="17"></line>
				<polyline points="10 9 9 9 8 9"></polyline>
			</svg>
			<h1>CV Designer DSL</h1>
		</div>
		<button id="generate-btn">
			<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<path d="M5 12h14"></path>
				<path d="M12 5l7 7-7 7"></path>
			</svg>
			Generar Documento
		</button>
	</div>
	
	<div class="split-container">
		<div class="editor-panel">
			<div id="xtext-editor" data-editor-xtext-lang="resume"></div>
		</div>
		
		<div class="pdf-panel">
			<div id="pdf-placeholder" class="pdf-placeholder">
				<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#dfe6e9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
					<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
					<polyline points="7 10 12 15 17 10"></polyline>
					<line x1="12" y1="15" x2="12" y2="3"></line>
				</svg>
				<p>La vista previa aparecerá al compilar</p>
			</div>
			<iframe id="pdf-viewer" src="about:blank"></iframe>
		</div>
	</div>

	<script type="text/javascript">
	    const JAVA_API_BASE = 'http://localhost:8081/api';
	    
	    document.getElementById('generate-btn').addEventListener('click', async () => {
	        if (typeof ace === 'undefined') return;

	        const btn = document.getElementById('generate-btn');
	        document.getElementById('pdf-placeholder').style.display = 'none';
	        
	        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg> Procesando...`;
	        btn.disabled = true;

			if (!document.getElementById('spin-style')) {
				const style = document.createElement('style');
				style.id = 'spin-style';
				style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } } .spin { animation: spin 0.8s linear infinite; }`;
				document.head.appendChild(style);
			}

	        try {
	            const editorNative = ace.edit("xtext-editor");
	            const dslText = editorNative.getValue();
	            editorNative.getSession().clearAnnotations();

	            const response = await fetch(`${JAVA_API_BASE}/process-dsl`, {
	                method: 'POST',
	                headers: { 'Content-Type': 'application/json' },
	                body: JSON.stringify({ dsl: dslText })
	            });

	            if (!response.ok) {
                    const errorData = await response.json();
                    if (errorData.issues) {
                        const annotations = errorData.issues.map(issue => ({
                            row: Math.max(0, (Number(issue.line) || 1) - 1), 
                            column: Math.max(0, Number(issue.column) || 0),
                            text: issue.message,
                            type: issue.severity ? issue.severity.toLowerCase() : 'error'
                        }));
                        editorNative.getSession().setAnnotations(annotations);
                    }
                    throw new Error("Error en la compilación");
	            }

	            const blob = await response.blob();
	            document.getElementById('pdf-viewer').src = URL.createObjectURL(blob);

	        } catch (err) {
	            console.error(err);
	        } finally {
	            btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg> Generar Documento`;
	            btn.disabled = false;
	        }
	    });
	</script>
</body>
</html>
