<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV DSL Studio</title>
    <style>
        /* Estilos básicos para replicar la estructura de Overleaf */
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #left-panel { flex: 1; display: flex; flex-direction: column; border-right: 2px solid #333; background: #1e1e1e; }
        #right-panel { flex: 1; display: flex; flex-direction: column; background: #525659; }
        
        #toolbar { padding: 15px; background: #252526; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        h1 { margin: 0; font-size: 1.2rem; font-weight: normal; color: #cccccc; }
        
        #editor-container { flex: 1; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; }

        /* Botón de compilación */
        button { 
            padding: 8px 20px; 
            cursor: pointer; 
            background: #007acc; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 0.9rem;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #005999; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div id="toolbar">
            <h1>CV DSL Studio</h1>
            <button id="compile-btn">Compilar CV</button>
        </div>
        <div id="editor-container"></div>
    </div>

    <div id="right-panel">
        <iframe id="pdf-viewer" src="about:blank"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <script>
        const JAVA_API_BASE = 'http://localhost:8080/api';

        // 2. Configuramos la ruta hacia la CDN de Monaco Editor
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            monaco.languages.register({ id: 'resumeDsl' });

            monaco.languages.setMonarchTokensProvider('resumeDsl', {
                tokenizer: {
                    root: [
                        [/\b(Metadata|Userdata|Experience|Projects|Education|Skills|Interests|Languages|Metrics|Metric|Customization|Profile|where|include|all|after|before|tags|from|language|style|font|imgPath|name|email|telephoneNumber|direction|city|country|title|description|company|startDate|endDate|technologies|link|institution|graduationDate)\b/, 'keyword'],
                        [/\b(Experience|Projects|Education|Skills|Interests|Languages|Metrics)\b/, 'type.identifier'],
                        [/"([^"\\]|\\.)*"/, 'string'],
                        [/\b\d+\b/, 'number'],
                        [/\b[A-Za-z_][\w]*\b/, 'identifier'],
                        [/\/\/.*$/, 'comment']
                    ]
                }
            });

            monaco.languages.setLanguageConfiguration('resumeDsl', {
                comments: {
                    lineComment: '//'
                },
                brackets: [['{', '}'], ['[', ']'], ['(', ')']],
                autoClosingPairs: [
                    { open: '"', close: '"' },
                    { open: '[', close: ']' },
                    { open: '(', close: ')' },
                    { open: '{', close: '}' }
                ]
            });

            // 3. Inicializamos el editor de código en la parte izquierda
            const model = monaco.editor.createModel(
                'Metadata \n    style: "Minimali" \n    font: "Calibri" \n    imgPath: "/assets/profile_pic_are.jpg"\n\n// Escribe el código de tu CV aquí...\n',
                'resumeDsl',
                monaco.Uri.parse('inmemory://model/main.resume')
            );

            window.editor = monaco.editor.create(document.getElementById('editor-container'), {
                model,
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false }
            });

            function toMarkerSeverity(severity) {
                if (severity === 'error') return monaco.MarkerSeverity.Error;
                if (severity === 'warning') return monaco.MarkerSeverity.Warning;
                return monaco.MarkerSeverity.Info;
            }

            async function validateDslInEditor() {
                const dslText = window.editor.getValue();
                try {
                    const response = await fetch(`${JAVA_API_BASE}/validate-dsl`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ dsl: dslText })
                    });

                    if (!response.ok) {
                        monaco.editor.setModelMarkers(model, 'dsl-validator', []);
                        return false;
                    }

                    const data = await response.json();
                    const issues = Array.isArray(data.issues) ? data.issues : [];

                    const markers = issues.map(issue => {
                        const lineNumber = Math.max(1, Number(issue.line) || 1);
                        const startColumn = Math.max(1, Number(issue.column) || 1);
                        const length = Math.max(1, Number(issue.length) || 1);

                        return {
                            startLineNumber: lineNumber,
                            endLineNumber: lineNumber,
                            startColumn,
                            endColumn: startColumn + length,
                            message: issue.message || 'Error de validacion',
                            severity: toMarkerSeverity(issue.severity)
                        };
                    });

                    monaco.editor.setModelMarkers(model, 'dsl-validator', markers);
                    return markers.some(marker => marker.severity === monaco.MarkerSeverity.Error);
                } catch (err) {
                    console.error('Fallo en validacion DSL:', err);
                    return false;
                }
            }

            let validationTimeout = null;
            function scheduleValidation() {
                if (validationTimeout) {
                    clearTimeout(validationTimeout);
                }
                validationTimeout = setTimeout(() => {
                    validateDslInEditor();
                }, 300);
            }

            window.editor.onDidChangeModelContent(scheduleValidation);
            scheduleValidation();

            // 4. Lógica de conexión con tu microservicio Java
            document.getElementById('compile-btn').addEventListener('click', async () => {
                const btn = document.getElementById('compile-btn');
                btn.innerText = 'Compilando...';
                btn.disabled = true;

                // Extraemos el texto que el usuario ha escrito
                const dslText = window.editor.getValue();

                try {
                    const hasErrors = await validateDslInEditor();
                    if (hasErrors) {
                        alert('Hay errores en el DSL. Revisa los marcadores rojos antes de compilar.');
                        return;
                    }

                    // Hacemos la petición POST al puerto 8080 (Java)
                    const response = await fetch(`${JAVA_API_BASE}/process-dsl`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ dsl: dslText })
                    });

                    if (!response.ok) {
                        const contentType = response.headers.get('content-type') || '';
                        if (contentType.includes('application/json')) {
                            const errorData = await response.json();
                            const issues = Array.isArray(errorData.issues) ? errorData.issues : [];

                            const markers = issues.map(issue => ({
                                startLineNumber: Math.max(1, Number(issue.line) || 1),
                                endLineNumber: Math.max(1, Number(issue.line) || 1),
                                startColumn: Math.max(1, Number(issue.column) || 1),
                                endColumn: Math.max(1, (Number(issue.column) || 1) + Math.max(1, Number(issue.length) || 1)),
                                message: issue.message || 'Error de compilacion',
                                severity: toMarkerSeverity(issue.severity)
                            }));
                            monaco.editor.setModelMarkers(model, 'dsl-validator', markers);

                            alert('Error de compilacion:\n' + (errorData.message || 'Revisa los marcadores del editor.'));
                            throw new Error(errorData.message || 'Compilacion fallida');
                        }

                        const errorText = await response.text();
                        alert('Error de compilacion:\n' + errorText);
                        throw new Error(errorText);
                    }

                    // Si Java nos devuelve el PDF, lo convertimos a un objeto visualizable
                    const blob = await response.blob();
                    const pdfUrl = URL.createObjectURL(blob);
                    
                    // Inyectamos el PDF en la parte derecha de la pantalla
                    document.getElementById('pdf-viewer').src = pdfUrl;

                } catch (err) {
                    console.error("Fallo de conexión:", err);
                } finally {
                    // Restauramos el botón
                    btn.innerText = 'Compilar CV';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
